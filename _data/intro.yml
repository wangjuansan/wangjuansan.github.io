content: "I'm a PhD student of the Laboratory for Image Information Communications at Tohoku University  under the supervisor of Prof.Omachi. Previously, I received M.S. from HoHai University in Jun. 2021 and B.S. from JiShou University in Jun. 2018. My research interest includes 3D Scene Understanding/Object Detection/Image Recognition/Multi-modal/Zero-shot learning and their applications based on deep learning & Convolutional Neural Networks."
